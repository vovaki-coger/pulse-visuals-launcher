name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build Windows
        run: npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build Linux
        run: npm run build:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          name: "Pulse Visuals Launcher ${{ github.ref_name }}"
          body: |
            ## Pulse Visuals Launcher ${{ github.ref_name }}

            ### Установка
            - **Windows**: скачай `Pulse.Visuals.Launcher.Setup.exe` и запусти
            - **Linux**: скачай `.AppImage`, сделай исполняемым (`chmod +x`) и запусти

            ### Что внутри
            - Браузер серверов (ugame.ru, FunTime и другие)
            - Полная конфигурация модулей Pulse Visuals
            - Настройки игры (RAM, разрешение, Java)
            - Система друзей
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
